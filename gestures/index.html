<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Gesture Lab</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 24px;
      background: #0c1118;
      color: #e7edf4;
      font-family: system-ui, sans-serif;
    }
    h1 { font-size: 18px; font-weight: 600; margin: 0; }
    .stage {
      position: relative;
      width: 640px;
      height: 480px;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }
    /* The video is mirrored for a natural selfie view; the canvas is NOT —
       landmarks are mirrored in code so drawing coords match the display. */
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    canvas { position: absolute; inset: 0; }
    #status {
      padding: 6px 14px;
      border-radius: 999px;
      background: #1c2633;
      font-size: 14px;
    }
    #status.active { background: #14532d; }
    #panel {
      width: 640px;
      font: 12px/1.6 ui-monospace, monospace;
      color: #93a4b8;
      white-space: pre-wrap;
    }
    #panel .err { color: #f87171; }
    .hint { font-size: 12px; color: #64748b; }
  </style>
</head>
<body>
  <h1>Gesture Lab</h1>
  <div class="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay" width="640" height="480"></canvas>
  </div>
  <div id="status">Loading…</div>
  <div id="panel"></div>
  <div class="hint">press <b>r</b> to reload gesture definitions</div>
  <script type="module" src="./tracker.ts"></script>
</body>
</html>
