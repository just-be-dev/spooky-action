<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Pinch Detector</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #111;
        color: #eee;
        font-family: system-ui, sans-serif;
      }
      #stage {
        position: relative;
      }
      video,
      canvas {
        width: 640px;
        height: 480px;
        border-radius: 12px;
        transform: scaleX(-1); /* mirror so it feels natural */
      }
      canvas {
        position: absolute;
        inset: 0;
      }
      #status {
        font-size: 28px;
        font-weight: 600;
        padding: 8px 24px;
        border-radius: 999px;
        background: #333;
        transition: background 0.1s;
      }
      #status.pinching {
        background: #16a34a;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay" width="640" height="480"></canvas>
    </div>
    <div id="status">Loading model…</div>
    <script type="module" src="./frontend.ts"></script>
  </body>
</html>
