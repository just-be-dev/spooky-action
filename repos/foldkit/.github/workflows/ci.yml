name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Block unresolved Claude comments
        run: pnpm check:no-claude-comments

      - name: Check formatting
        run: pnpm format:check

      - name: Verify skill version bump
        if: github.event_name == 'pull_request'
        run: pnpm check:skill-version

      - name: Block major changesets (pre-1.0)
        if: github.event_name == 'pull_request'
        run: pnpm check:no-major-changesets

      - name: Verify changeset ignore list
        run: pnpm check:changeset-ignore

      - name: Check changeset status
        if: github.event_name == 'pull_request'
        run: pnpm changeset status --since=origin/main

      - name: Lint
        run: pnpm lint

      - name: Check circular dependencies
        run: pnpm check:circular-deps

      - name: Build packages
        run: pnpm -r --filter './packages/**' build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Smoke test create-foldkit-app
        run: pnpm check:create-foldkit-app-smoke

      - name: Test
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm --filter website exec playwright install --with-deps chromium

      - name: E2E smoke test
        run: pnpm --filter website test:e2e
